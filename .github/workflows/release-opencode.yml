name: Release opencode plugin

# Publish opencode/ to npm as token-optimizer-opencode using npm Trusted
# Publishing (OIDC). No npm token is stored anywhere: the runner exchanges a
# short-lived GitHub OIDC identity for publish rights, so there is no secret to
# leak, rotate, or have silently expire. Replaces the 2FA-bypass token flow that
# npm is deprecating (https://gh.io/npm-gat-bypass2fa-deprecation).
#
# Manual trigger on purpose. Publishing is deliberate, never a side effect of a
# push. Bump opencode/package.json first, then run this from the Actions tab.
on:
  workflow_dispatch:

permissions:
  contents: read
  # Required for Trusted Publishing. Without it npm cannot verify the runner.
  id-token: write

# Never let two publishes race for the same version.
concurrency:
  group: release-opencode
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: opencode
    steps:
      - uses: actions/checkout@v4

      # bun is OpenCode's own runtime and what build/test expect.
      # Pinned to an immutable commit, not a tag: this job can publish to npm, so a
      # repointed tag on a third-party action would execute with publish rights.
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Node 22 ships npm 10.x; OIDC trusted publishing needs >= 11.5.1.
      # Pinned rather than @latest so the version that publishes is the version
      # this release was tested against, and cannot change under us mid-release.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11.6.1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Gate the release on the suite, so a broken build cannot reach users.
      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Publish to npm
        run: npm publish --access public
